<!DOCTYPE html>
<html>
<head>
    <title>Flask App</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        h2 {
            color: #333;
        }

        form {
            margin: 20px;
        }

        img {
            width: 200px;
            height: auto;
            margin: 10px;
            border-radius: 10px;
            border: 2px solid #ccc;
        }
    </style>
</head>

<body>

<a href="/">Home</a> |
<a href="/bye">Bye</a>
<h2>Image Gallery Upload</h2>
<p> Learn more about Flask here: <a href="https://flask.palletsprojects.com/en/stable/quickstart/#" target="_blank"> Flask Quickstart Guide </a> </p>
<!-- Upload Form -->
<form action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="file" multiple required>
    <button type="submit">Upload</button>
</form>

<hr>

<!-- Gallery -->
{% if images %}
    {% for img in images %}
        <img src="{{ url_for('uploaded_file', filename=img) }}" alt="image">
    {% endfor %}
{% else %}
    <p>No images uploaded yet.</p>
{% endif %}

<hr>


</body>
</html>
